<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <rect width="128" height="128" rx="28" fill="#0f172a"/>

  <!-- Screwdriver: rotated +45 (handle bottom-left, tip top-right) -->
  <g transform="rotate(45 64 64)">
    <rect x="55" y="64" width="18" height="44" rx="3" fill="#ea580c"/>
    <rect x="58" y="56" width="12" height="10" fill="#9a3412"/>
    <rect x="61" y="32" width="6" height="24" fill="#cbd5e1"/>
    <rect x="58" y="22" width="12" height="10" fill="#cbd5e1"/>
  </g>

  <!-- Wrench: rotated -45 (head top-left, handle bottom-right) -->
  <g transform="rotate(-45 64 64)">
    <rect x="58" y="64" width="12" height="50" rx="6" fill="#fb923c"/>
    <circle cx="64" cy="46" r="20" fill="#fb923c"/>
    <circle cx="64" cy="46" r="7" fill="#0f172a"/>
    <rect x="60" y="26" width="8" height="22" fill="#0f172a"/>
  </g>
</svg>
